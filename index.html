<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Ohm Dodge Poop</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #fffaf2;
      --muted: #f4d9b8;
      --accent: #2dd4bf;
      --danger: #ff6b6b;
      --panel: rgba(19, 24, 33, 0.85);
      --line: rgba(255, 255, 255, 0.16);
    }
    * { box-sizing: border-box; touch-action: manipulation; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #1d1b24; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 18% 20%, rgba(45, 212, 191, 0.22), transparent 30%),
                  linear-gradient(140deg, #1d1b24 0%, #334155 42%, #78350f 100%);
    }
    .game-shell { position: relative; width: 100vw; height: 100dvh; display: flex; flex-direction: column; }
    header { z-index: 3; padding: 16px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
    h1 { margin: 0; font-size: clamp(16px, 4vw, 24px); text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .hud { display: flex; gap: 8px; }
    .hud-item { background: var(--panel); padding: 6px 10px; border: 1px solid var(--line); border-radius: 8px; text-align: center; min-width: 60px; backdrop-filter: blur(10px); }
    .hud-label { display: block; font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
    .hud-value { display: block; font-size: 16px; font-weight: 900; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; touch-action: none; }
    .overlay {
      position: absolute; inset: 0; z-index: 10; background: rgba(0,0,0,0.7);
      display: flex; justify-content: center; align-items: center; padding: 20px;
      backdrop-filter: blur(5px); transition: opacity 0.3s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .modal {
      background: rgba(12, 16, 24, 0.95); backdrop-filter: blur(20px);
      padding: 24px; border-radius: 16px; border: 1px solid var(--line);
      width: 100%; max-width: 400px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .portrait { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; margin-bottom: 12px; object-fit: cover; }
    .lang-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 16px; }
    .lang-btn {
      background: rgba(255,255,255,0.08); border: 1px solid var(--line); border-radius: 6px;
      color: #fff; font-size: 11px; padding: 6px 8px; cursor: pointer; transition: all 0.2s;
    }
    .lang-btn.active { background: var(--accent); color: #000; font-weight: 700; border-color: var(--accent); }
    .id-input {
      width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 12px; text-align: center; font-size: 16px; outline: none;
    }
    .primary-button {
      width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px;
      color: #000; font-weight: 900; font-size: 18px; cursor: pointer;
    }
    .ranking-box { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 12px; text-align: left; }
    .ranking-title { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
    .ranking-list { list-style: none; padding: 0; margin: 0; font-size: 13px; max-height: 80px; overflow-y: auto; }
    .ranking-item { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 5; pointer-events: none; }
    .touch-btn {
      width: 65px; height: 65px; border-radius: 50%; background: var(--panel); border: 1px solid var(--line);
      color: #fff; font-size: 28px; font-weight: 900; pointer-events: auto; display: none; backdrop-filter: blur(10px);
    }
    @media (max-width: 768px) { .touch-btn { display: block; } }
  </style>
</head>
<body>
  <div class="game-shell">
    <canvas id="gameCanvas"></canvas>
    <header>
      <h1 id="ui-title">Ohm Dodge</h1>
      <div class="hud">
        <div class="hud-item"><span class="hud-label" id="ui-score-label">SCORE</span><span class="hud-value" id="ui-score">0</span></div>
        <div class="hud-item"><span class="hud-label" id="ui-best-label">BEST</span><span class="hud-value" id="ui-best">0</span></div>
        <div class="hud-item"><span class="hud-label" id="ui-lives-label">LIVES</span><span class="hud-value" id="ui-lives">3</span></div>
      </div>
    </header>
    <div id="overlay" class="overlay">
      <div class="modal">
        <img class="portrait" src="https://pbs.twimg.com/media/GTZBGgrbcAAFH_F.jpg" alt="Ohm">
        <h2 id="ui-modal-title">Ready?</h2>
        <p id="ui-modal-text">Avoid falling poop!</p>
        <div class="lang-selector" id="lang-selector">
          <button class="lang-btn" data-lang="ko">한국어</button>
          <button class="lang-btn" data-lang="en">English</button>
          <button class="lang-btn" data-lang="th">ไทย</button>
          <button class="lang-btn" data-lang="ja">日本語</button>
          <button class="lang-btn" data-lang="zh">中文</button>
          <button class="lang-btn" data-lang="es">Español</button>
          <button class="lang-btn" data-lang="fr">Français</button>
          <button class="lang-btn" data-lang="de">Deutsch</button>
          <button class="lang-btn" data-lang="vi">Tiếng Việt</button>
          <button class="lang-btn" data-lang="id">Bahasa</button>
        </div>
        <input type="text" id="player-id" class="id-input" maxlength="10" placeholder="ID">
        <button id="start-btn" class="primary-button">START</button>
        <div class="ranking-box">
          <div class="ranking-title" id="ui-ranking-label">🏆 RANKINGS</div>
          <ul id="ranking-list" class="ranking-list"></ul>
        </div>
      </div>
    </div>
    <div class="controls">
      <button id="left-btn" class="touch-btn">←</button>
      <button id="right-btn" class="touch-btn">→</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const playerIdInput = document.getElementById('player-id');
    const rankingList = document.getElementById('ranking-list');
    
    const i18n = {
      ko: { title: "옴 콘나팟 똥피하기", score: "점수", best: "최고", lives: "생명", ready: "준비됐나요?", instr: "똥을 피해 오래 버티세요! 드래그나 버튼으로 움직입니다.", placeholder: "아이디 입력", start: "시작하기", ranking: "랭킹", noRank: "기록 없음", gameOver: "게임 종료", goText: "{score}점! 다시 도전하세요.", restart: "다시 시작", alertID: "아이디를 입력하세요!" },
      en: { title: "Ohm Dodge Poop", score: "SCORE", best: "BEST", lives: "LIVES", ready: "Ready?", instr: "Avoid poop! Use drag or buttons to move.", placeholder: "Enter ID", start: "START", ranking: "RANKINGS", noRank: "No records", gameOver: "GAME OVER", goText: "Score: {score}! Try again.", restart: "RESTART", alertID: "Please enter your ID!" },
      th: { title: "เกมหลบอึของโอม", score: "คะแนน", best: "สูงสุด", lives: "ชีวิต", ready: "พร้อมไหม?", instr: "หลบอึให้นานที่สุด! ลากหรือใช้ปุ่มเพื่อเคลื่อนที่", placeholder: "ใส่ไอดี", start: "เริ่มเกม", ranking: "อันดับ", noRank: "ไม่มีอันดับ", gameOver: "จบเกม", goText: "{score} คะแนน! พยายามใหม่นะ", restart: "เล่นอีกครั้ง", alertID: "กรุณาใส่ไอดี!" },
      ja: { title: "オームのうんち避け", score: "スコア", best: "最高", lives: "ライフ", ready: "準備はいい？", instr: "落ちてくるうんちを避けて！ドラッグかボタンで移動。", placeholder: "ID入力", start: "スタート", ranking: "ランキング", noRank: "記録なし", gameOver: "ゲームオーバー", goText: "スコア: {score}点！", restart: "再開", alertID: "IDを入力してください！" },
      zh: { title: "Ohm 躲避大便", score: "分数", best: "最高", lives: "生命", ready: "准备好了吗？", instr: "躲避大便！通过拖动或按钮移动。", placeholder: "输入 ID", start: "开始", ranking: "排行榜", noRank: "暂无排名", gameOver: "游戏结束", goText: "分数: {score}！", restart: "重新开始", alertID: "请输入 ID！" },
      es: { title: "Ohm Esquiva Caca", score: "Puntaje", best: "Mejor", lives: "Vidas", ready: "¿Listo?", instr: "¡Evita la caca! Arrastra o usa los botones.", placeholder: "Ingresar ID", start: "EMPEZAR", ranking: "RANKING", noRank: "Sin registros", gameOver: "FIN", goText: "¡Puntaje {score}!", restart: "REINICIAR", alertID: "¡Ingresa tu ID!" },
      fr: { title: "Ohm Esquive Caca", score: "Score", best: "Meilleur", lives: "Vies", ready: "Prêt ?", instr: "Évitez les crottes ! Glissez ou utilisez les boutons.", placeholder: "Entrer ID", start: "COMMENCER", ranking: "CLASSEMENT", noRank: "Aucun record", gameOver: "FIN", goText: "Score: {score} !", restart: "RECOMMENCER", alertID: "Entrez votre ID !" },
      de: { title: "Ohm Kacke-Ausweichen", score: "Punkte", best: "Besten", lives: "Leben", ready: "Bereit?", instr: "Weiche der Kacke aus! Ziehen oder Tasten benutzen.", placeholder: "ID eingeben", start: "STARTEN", ranking: "RANGLISTE", noRank: "Keine Einträge", gameOver: "SPIEL VORBEI", goText: "Punkte: {score}!", restart: "NEUSTART", alertID: "Bitte ID eingeben!" },
      vi: { title: "Ohm Tránh Phân", score: "Điểm", best: "Kỷ lục", lives: "Mạng", ready: "Sẵn sàng?", instr: "Tránh phân rơi! Kéo hoặc dùng nút để di chuyển.", placeholder: "Nhập ID", start: "BẮT ĐẦU", ranking: "XẾP HẠNG", noRank: "Chưa có kỷ lục", gameOver: "KẾT THÚC", goText: "Điểm: {score}!", restart: "THỬ LẠI", alertID: "Nhập ID của bạn!" },
      id: { title: "Ohm Hindari Kotoran", score: "Skor", best: "Terbaik", lives: "Nyawa", ready: "Siap?", instr: "Hindari kotoran! Seret atau gunakan tombol.", placeholder: "Masukkan ID", start: "MULAI", ranking: "PERINGKAT", noRank: "Belum ada record", gameOver: "SELESAI", goText: "Skor: {score}!", restart: "MULAI LAGI", alertID: "Silakan masukkan ID Anda!" }
    };

    const state = {
      lang: localStorage.getItem('ohmDodgeLang') || 'ko',
      running: false, gameOver: false, score: 0,
      best: Number(localStorage.getItem('ohmDodgeBest') || 0),
      lives: 3, width: 0, height: 0, dpr: 1, lastTime: 0,
      spawnTimer: 0, spawnEvery: 780, bonusTimer: 0, timeElapsed: 0,
      move: 0, poop: [], bonuses: [],
      player: { x: 0, y: 0, radius: 36, speed: 450, invincible: 0 }
    };

    const ohmImg = new Image();
    ohmImg.crossOrigin = "anonymous";
    ohmImg.src = "https://pbs.twimg.com/media/GTZBGgrbcAAFH_F.jpg";

    function updateUI() {
      const t = i18n[state.lang];
      document.getElementById('ui-title').textContent = t.title;
      document.getElementById('ui-score-label').textContent = t.score;
      document.getElementById('ui-best-label').textContent = t.best;
      document.getElementById('ui-lives-label').textContent = t.lives;
      document.getElementById('ui-modal-title').textContent = state.gameOver ? t.gameOver : t.ready;
      document.getElementById('ui-modal-text').textContent = state.gameOver ? t.goText.replace('{score}', Math.floor(state.score)) : t.instr;
      playerIdInput.placeholder = t.placeholder;
      startBtn.textContent = state.gameOver ? t.restart : t.start;
      document.getElementById('ui-ranking-label').textContent = "🏆 " + t.ranking;
      document.getElementById('ui-best').textContent = state.best;
      
      const langBtns = document.querySelectorAll('.lang-btn');
      for (let i = 0; i < langBtns.length; i++) {
        const btn = langBtns[i];
        btn.classList.toggle('active', btn.getAttribute('data-lang') === state.lang);
      }

      const rankings = JSON.parse(localStorage.getItem('ohmRankings') || '[]');
      const top5 = rankings.sort((a,b) => b.score - a.score).slice(0, 5);
      rankingList.innerHTML = top5.map((r,i) => `
        <li class="ranking-item"><span>${i+1}. ${r.id}</span><span>${r.score}</span></li>
      `).join('') || `<li class="ranking-item">${t.noRank}</li>`;
    }

    function resize() {
      state.dpr = Math.min(window.devicePixelRatio || 1, 2);
      state.width = window.innerWidth; state.height = window.innerHeight;
      canvas.width = state.width * state.dpr; canvas.height = state.height * state.dpr;
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      state.player.radius = Math.max(30, Math.min(44, state.width * 0.08));
      state.player.y = state.height - 100;
      state.player.x = state.width / 2;
    }

    function spawnPoop() {
      const size = 26 + Math.random() * 20;
      const speedMult = 1 + (state.timeElapsed / 30000);
      state.poop.push({
        x: Math.random() * (state.width - size),
        y: -size, size,
        speed: (160 + Math.random() * 150) * speedMult,
        rotation: 0, spin: (Math.random() - 0.5) * 0.1
      });
    }

    function spawnBonus() {
      const size = 30;
      state.bonuses.push({ x: Math.random() * (state.width - size), y: -size, size, speed: 150 });
    }

    function update(dt) {
      state.timeElapsed += dt;
      state.score += (dt * 0.02) * (1 + state.timeElapsed / 10000);
      document.getElementById('ui-score').textContent = Math.floor(state.score);
      
      state.spawnEvery = Math.max(200, 780 - (state.timeElapsed * 0.005));
      state.spawnTimer += dt;
      if (state.spawnTimer > state.spawnEvery) { state.spawnTimer = 0; spawnPoop(); }
      
      state.bonusTimer += dt;
      if (state.bonusTimer > 15000) { state.bonusTimer = 0; spawnBonus(); }

      state.player.x += state.move * state.player.speed * (dt / 1000);
      state.player.x = Math.max(state.player.radius, Math.min(state.width - state.player.radius, state.player.x));
      state.player.invincible = Math.max(0, state.player.invincible - dt);

      state.poop.forEach(p => { p.y += p.speed * (dt / 1000); p.rotation += p.spin; });
      state.poop = state.poop.filter(p => {
        const cx = p.x + p.size / 2;
        const cy = p.y + p.size / 2;
        const dx = cx - state.player.x;
        const dy = cy - state.player.y;
        if (state.player.invincible <= 0 && Math.hypot(dx, dy) < (state.player.radius + p.size / 2) * 0.8) {
          state.lives--; document.getElementById('ui-lives').textContent = state.lives;
          state.player.invincible = 1500; if (state.lives <= 0) endGame(); return false;
        }
        return p.y < state.height + 50;
      });

      state.bonuses.forEach(b => { b.y += b.speed * (dt / 1000); });
      state.bonuses = state.bonuses.filter(b => {
        const cx = b.x + b.size / 2;
        const cy = b.y + b.size / 2;
        const dx = cx - state.player.x;
        const dy = cy - state.player.y;
        if (Math.hypot(dx, dy) < state.player.radius + b.size / 2) { state.player.invincible = 3000; return false; }
        return b.y < state.height + 50;
      });
    }

    function draw() {
      ctx.clearRect(0, 0, state.width, state.height);
      
      ctx.save();
      ctx.translate(state.player.x, state.player.y);
      if (state.player.invincible > 0) {
        ctx.beginPath();
        ctx.arc(0, 0, state.player.radius + 10, 0, Math.PI * 2);
        ctx.strokeStyle = state.player.invincible > 1500 ? "cyan" : "red";
        ctx.lineWidth = 3; ctx.setLineDash([5, 5]); ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(0, 0, state.player.radius, 0, Math.PI * 2); ctx.clip();
      if (ohmImg.complete) ctx.drawImage(ohmImg, -state.player.radius, -state.player.radius, state.player.radius * 2, state.player.radius * 2);
      ctx.restore();

      ctx.font = "30px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      state.poop.forEach(p => {
        ctx.save();
        ctx.translate(p.x + p.size / 2, p.y + p.size / 2);
        ctx.rotate(p.rotation);
        ctx.fillText("💩", 0, 0);
        ctx.restore();
      });
      state.bonuses.forEach(b => {
        ctx.fillText("🛡️", b.x + b.size / 2, b.y + b.size / 2);
      });
    }

    function loop(now) {
      if (!state.running) return;
      const dt = Math.min(32, now - (state.lastTime || now));
      state.lastTime = now; update(dt); draw();
      requestAnimationFrame(loop);
    }

    function startGame() {
      const id = playerIdInput.value.trim();
      if (!id) { alert(i18n[state.lang].alertID); return; }
      localStorage.setItem('ohmDodgeLastID', id);
      state.running = true; state.gameOver = false; state.score = 0; state.lives = 3;
      state.timeElapsed = 0; state.poop = []; state.bonuses = [];
      document.getElementById('ui-lives').textContent = 3;
      overlay.classList.add('hidden');
      state.lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function endGame() {
      state.running = false; state.gameOver = true;
      const rankings = JSON.parse(localStorage.getItem('ohmRankings') || '[]');
      rankings.push({ id: playerIdInput.value.trim(), score: Math.floor(state.score) });
      localStorage.setItem('ohmRankings', JSON.stringify(rankings));
      if (state.score > state.best) { state.best = Math.floor(state.score); localStorage.setItem('ohmDodgeBest', state.best); }
      updateUI(); overlay.classList.remove('hidden');
    }

    const langBtns = document.querySelectorAll('.lang-btn');
    for (let i = 0; i < langBtns.length; i++) {
      const btn = langBtns[i];
      btn.addEventListener('click', function() {
        state.lang = btn.getAttribute('data-lang');
        localStorage.setItem('ohmDodgeLang', state.lang);
        updateUI();
      });
    }
    
    startBtn.addEventListener('click', startGame);
    playerIdInput.value = localStorage.getItem('ohmDodgeLastID') || '';

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') state.move = -1;
      if (e.key === 'ArrowRight') state.move = 1;
      if (e.key === 'Enter' && !state.running) startGame();
    });
    window.addEventListener('keyup', () => state.move = 0);
    
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    
    const handleTouchStart = (dir) => (e) => { e.preventDefault(); state.move = dir; };
    const handleTouchEnd = () => (e) => { e.preventDefault(); state.move = 0; };
    
    leftBtn.addEventListener('touchstart', handleTouchStart(-1));
    leftBtn.addEventListener('touchend', handleTouchEnd());
    rightBtn.addEventListener('touchstart', handleTouchStart(1));
    rightBtn.addEventListener('touchend', handleTouchEnd());

    // Direct drag control on canvas
    canvas.addEventListener('touchstart', (e) => {
      if (!state.running) return;
      const touch = e.touches[0];
      state.player.x = Math.max(state.player.radius, Math.min(state.width - state.player.radius, touch.clientX));
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!state.running) return;
      const touch = e.touches[0];
      state.player.x = Math.max(state.player.radius, Math.min(state.width - state.player.radius, touch.clientX));
      e.preventDefault();
    }, { passive: false });
    
    window.addEventListener('resize', resize);
    resize(); updateUI();
  </script>
</body>
</html>
